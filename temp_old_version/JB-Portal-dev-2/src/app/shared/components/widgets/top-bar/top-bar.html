<div class="top-header">
  <div class="container">
    <div class="row align-items-center">
      <!-- LEFT -->
      <div class="col-lg-6 d-none d-lg-block">
        <div class="header-contact">
          <ul class="d-flex align-items-center gap-4 m-0 p-0">
            <!-- Welcome -->
            <li>
              {{ 'welcome_to' | translate }} {{ (setting$ |
              async)?.general?.site_name }}
            </li>

            <!-- Support Email -->
            <li>
              <i class="ri-mail-line me-1"></i>
              <a href="mailto:support@aura.com">support@aura.com</a>
            </li>
          </ul>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="col-12 col-lg-6 text-center text-lg-end">
        <ul
          class="right-nav-about d-flex align-items-center justify-content-center justify-content-lg-end gap-3 m-0 p-0"
        >
          <!-- BEFORE LOGIN -->
          @if (!isLoggedIn()) {
          <li>
            <a (click)="goToLogin()"> <i class="ri-user-line"></i> Sign In </a>
          </li>
          }

          <!-- AFTER LOGIN -->
          @if (isLoggedIn()) {
          <li>
            <a (click)="goToProfile()">
              <i class="ri-user-line"></i> {{ getUserName() }}
            </a>
          </li>
          }
        </ul>
      </div>
    </div>
  </div>
</div>
