<!-- FLOATING TRIGGER BUTTON -->
<button class="va-trigger" [class.active]="isOpen" (click)="togglePanel()" title="Veloria AI Assistant" id="va-trigger-btn">
  <span class="va-trigger-icon" *ngIf="!isOpen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="currentColor"/>
    </svg>
  </span>
  <span class="va-trigger-close" *ngIf="isOpen">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </span>
  <span class="va-trigger-pulse"></span>
  <span class="va-trigger-status" [class.online]="isOnline"></span>
</button>

<!-- CHAT PANEL -->
<div class="va-panel" [class.visible]="isOpen">

  <!-- ── HEADER ── -->
  <div class="va-header">
    <div class="va-header-glow"></div>
    <div class="va-header-content">
      <div class="va-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="currentColor"/>
        </svg>
        <span class="va-avatar-ring"></span>
      </div>
      <div class="va-header-info">
        <h3 class="va-title">Veloria AI</h3>
        <div class="va-subtitle">
          <span class="va-status-dot" [class.online]="isOnline"></span>
          <span class="va-status-text">{{ isOnline ? 'Ready to assist' : 'Connecting...' }}</span>
          <span class="va-speaking-badge" *ngIf="isSpeaking">
            <span class="va-eq-bar"></span>
            <span class="va-eq-bar"></span>
            <span class="va-eq-bar"></span>
            Speaking
          </span>
        </div>
      </div>
      <div class="va-header-btns">
        <button class="va-icon-btn" (click)="toggleTTS()" [title]="ttsEnabled ? 'Mute voice' : 'Enable voice'" id="va-tts-btn">
          <svg *ngIf="ttsEnabled" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <svg *ngIf="!ttsEnabled" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
        <button class="va-icon-btn" (click)="clearHistory()" title="Clear chat" id="va-clear-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
        <button class="va-icon-btn va-close-btn" (click)="closePanel()" id="va-close-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── OFFLINE BANNER ── -->
  <div class="va-offline-bar" *ngIf="!isOnline">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span>AI server offline <code></code></span>
  </div>

  <!-- ── MESSAGES ── -->
  <div class="va-messages" id="va-messages">

    <!-- Empty state -->
    <div class="va-empty" *ngIf="messages.length === 0 && !isLoading">
      <div class="va-empty-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="currentColor" opacity="0.15"/>
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
      <p class="va-empty-title">How can I help you?</p>
      <p class="va-empty-sub">Search products, manage cart, track orders — just ask or tap a shortcut below</p>
    </div>

    <!-- Message list -->
    <div class="va-msg" [class.is-user]="m.role==='user'" [class.is-bot]="m.role==='bot'" *ngFor="let m of messages; trackBy: trackMsg">
      <div class="va-msg-avatar" *ngIf="m.role==='bot'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
        </svg>
      </div>
      <div class="va-msg-body">
        <div class="va-msg-bubble">{{ m.text }}</div>
        <div class="va-msg-footer">
          <span class="va-msg-intent" *ngIf="m.intent && m.role==='bot'">{{ m.intent }}</span>
          <span class="va-msg-time">{{ m.time }}</span>
        </div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="va-typing-row" *ngIf="isLoading">
      <div class="va-typing-avatar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
        </svg>
      </div>
      <div class="va-typing-bubble">
        <div class="va-typing-dot"></div>
        <div class="va-typing-dot"></div>
        <div class="va-typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- ── QUICK CHIPS ── -->
  <div class="va-chips-rail">
    <div class="va-chips-scroll">
      <button class="va-chip" *ngFor="let c of chips" (click)="send(c.cmd)">{{ c.label }}</button>
    </div>
  </div>

  <!-- ── INPUT AREA ── -->
  <div class="va-composer">
    <div class="va-composer-inner">
      <input
        class="va-composer-input"
        id="va-input"
        type="text"
        [(ngModel)]="inputText"
        (keydown)="onEnter($event)"
        [placeholder]="isListening ? 'Listening…' : 'Type a command…'"
        [class.listening]="isListening"
        autocomplete="off"
        spellcheck="false" />
      <div class="va-composer-actions">
        <button class="va-btn-mic" [class.recording]="isListening" (click)="toggleVoice()" *ngIf="hasSpeech" id="va-mic-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span class="va-mic-ring"></span>
          <span class="va-mic-ring va-mic-ring-2"></span>
        </button>
        <button class="va-btn-send" (click)="send()" [disabled]="isLoading || !inputText.trim()" id="va-send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── FOOTER ── -->
  <div class="va-brand">
    <span class="va-brand-dot"></span>
    Powered by Veloria AI
  </div>
</div>
