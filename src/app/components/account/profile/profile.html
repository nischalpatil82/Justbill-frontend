<div class="counter-section">

  <!-- Heading (same as dashboard style) -->
  <div class="welcome-msg">
    <h4>Profile</h4>
    <p>Manage your account details</p>
  </div>

  <!-- 🔥 YOUR EXACT BOX STYLE -->
  <div class="box mt-3">
    <div class="box-head">
      <h4>Profile</h4>
    </div>

    <div class="row">
      <div class="col-sm-6">
        <h6>Email : {{ (user$ | async)?.email || 'admin@example.com' }}</h6>
        <a href="javascript:void(0)" (click)="openModal('profile')">
          Edit Profile
        </a>
      </div>

      <div class="col-sm-6">
        <h6>Password : ●●●●●●</h6>
        <a href="javascript:void(0)" (click)="openModal('password')">
          Change Password
        </a>
      </div>
    </div>
  </div>

</div>
